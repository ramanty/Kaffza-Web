# Kaffza — Production Docker Compose
# Usage:
#   cp ../.env.production.example ../.env.production
#   docker compose -f production/docker-compose.yml up -d --build

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-kaffza_db}
      POSTGRES_USER: ${DATABASE_USER:-kaffza_user}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-change_me}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-kaffza_minio}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-kaffza_minio_secret}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env.production
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - postgres
      - redis
    ports:
      - "4000:4000"

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env.production
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    depends_on:
      - api
    ports:
      - "3000:3000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - web
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../nginx/ssl:/etc/nginx/ssl
      - ../nginx/certbot:/var/www/certbot

  certbot:
    image: certbot/certbot:latest
    profiles: ["tools"]
    volumes:
      - ../nginx/certbot:/var/www/certbot
      - ../nginx/ssl:/etc/letsencrypt
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "echo 'Use ssl_one_shot.sh to issue certificates' && sleep 3600"

volumes:
  postgres_data:
  redis_data:
  minio_data:
