name: CI Pipeline
on:  
  push:  
    branches: ["main"]
  pull_request:  
    branches: ["main"]
jobs:  
  build-and-test:  
    runs-on: ubuntu-latest
    steps:  
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: npx prettier --check . || true
      - run: pnpm run lint || true
      - run: pnpm run build
      - run: pnpm run test || true