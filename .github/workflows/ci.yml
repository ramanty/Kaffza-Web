name: CI Pipeline\non:  \n  push:  \n    branches: ["main"]\n  pull_request:  \n    branches: ["main"]\njobs:  \n  build-and-test:  \n    runs-on: ubuntu-latest\n    steps:  \n      - uses: actions/checkout@v4\n      - uses: pnpm/action-setup@v3\n        with:\n          version: 9.15.0\n      - uses: actions/setup-node@v4\n        with:\n          node-version: 20\n          cache: "pnpm"\n      - run: pnpm install --frozen-lockfile\n      - run: npx prettier --check .\n      - run: pnpm run lint\n      - run: pnpm run build\n