name: 🐛 Bug Report
description: Report a bug or unexpected behavior in Kaffza.
title: '[Bug]: '
labels: ['bug', 'needs-triage']
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to file a bug report! Please fill out this form as completely as possible.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: A clear and concise description of what actually happened.
      placeholder: What actually happened?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Logs
      description: If applicable, add screenshots or error logs to help explain your problem.
      placeholder: Paste screenshots or logs here...

  - type: dropdown
    id: affected-app
    attributes:
      label: Affected Application
      description: Which part of the platform is affected?
      multiple: true
      options:
        - API (NestJS)
        - Web (Next.js)
        - Mobile (Expo)
        - Database / Migrations
        - Docker / Infrastructure
        - Other
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: 'e.g., Node.js 20, pnpm 9.15, OS: Ubuntu 22.04'
      placeholder: Node.js version, OS, browser, etc.
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context about the problem here.
      placeholder: Any additional information...
