name: 🚀 Feature Request
description: Suggest a new feature or enhancement for Kaffza.
title: '[Feature]: '
labels: ['enhancement', 'needs-triage']
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Have an idea that would make Kaffza better? We'd love to hear it! Please fill out this form as completely as possible.

  - type: textarea
    id: problem-statement
    attributes:
      label: Problem Statement
      description: Is your feature request related to a problem? Please describe clearly.
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: Describe the solution or feature you'd like to see implemented.
      placeholder: Describe your solution in detail...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or features you've considered.
      placeholder: What alternatives did you think about?

  - type: dropdown
    id: affected-app
    attributes:
      label: Target Application / Area
      description: Which part of the platform would this feature affect?
      multiple: true
      options:
        - API (NestJS)
        - Web (Next.js)
        - Mobile (Expo)
        - Database / Schema
        - DevOps / Infrastructure
        - Documentation
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature to you?
      options:
        - 🔴 Critical — Blocking work
        - 🟠 High — Important for the product
        - 🟡 Medium — Nice to have soon
        - 🟢 Low — Nice to have eventually
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context, mockups, or screenshots about the feature request here.
      placeholder: Any additional information, designs, or references...
