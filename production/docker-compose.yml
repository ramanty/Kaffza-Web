# Kaffza — Production Docker Compose (Hardened)
# Usage:
#   cp ../.env.production.example ../.env.production
#   docker compose -f production/docker-compose.yml up -d --build

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-kaffza_db}
      POSTGRES_USER: ${DATABASE_USER:-kaffza_user}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U ${DATABASE_USER:-kaffza_user} -d ${DATABASE_NAME:-kaffza_db}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kaffza_net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kaffza_net

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-kaffza_minio}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-kaffza_minio_secret}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - kaffza_net

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env.production
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:4000/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - kaffza_net

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env.production
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - kaffza_net

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ../nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ../nginx/ssl:/etc/nginx/ssl
      - ../nginx/certbot:/var/www/certbot
    environment:
      DOMAIN: ${DOMAIN:-kaffza.me}
    command:
      [
        '/bin/sh',
        '-c',
        "envsubst '$$DOMAIN' < /etc/nginx/templates/default.conf.template > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'",
      ]
    healthcheck:
      test: ['CMD', 'wget', '-q', '-O', '/dev/null', 'http://localhost/']
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - kaffza_net

  certbot:
    image: certbot/certbot:latest
    profiles: ['tools']
    volumes:
      - ../nginx/certbot:/var/www/certbot
      - ../nginx/ssl:/etc/letsencrypt
    entrypoint: ['/bin/sh', '-c']
    command: >
      "echo 'Use ssl_one_shot.sh to issue certificates' && sleep 3600"

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  kaffza_net:
    driver: bridge
